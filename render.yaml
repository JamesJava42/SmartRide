databases:
  - name: rideconnect-db
    databaseName: rideconnect
    user: rideconnect
    plan: free

services:
  # ─── Redis ────────────────────────────────────────────────────────────────
  - type: redis
    name: rideconnect-redis
    plan: free
    ipAllowList: []

  # ─── Auth Service ─────────────────────────────────────────────────────────
  - type: web
    name: auth-service
    runtime: docker
    dockerfilePath: services/auth_service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTH_DATABASE_URL
        fromDatabase:
          name: rideconnect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rideconnect-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false  # Set manually in Render dashboard

  # ─── Marketplace Service ──────────────────────────────────────────────────
  - type: web
    name: marketplace-service
    runtime: docker
    dockerfilePath: services/marketplace_service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: MARKETPLACE_DATABASE_URL
        fromDatabase:
          name: rideconnect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rideconnect-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          name: auth-service
          type: web
          envVarKey: JWT_SECRET_KEY
      - key: JWT_ALGORITHM
        value: HS256
      - key: INTERNAL_SERVICE_TOKEN
        fromService:
          name: auth-service
          type: web
          envVarKey: INTERNAL_SERVICE_TOKEN
      - key: AUTH_SERVICE_URL
        fromService:
          name: auth-service
          type: web
          property: host

  # ─── Operations Service ───────────────────────────────────────────────────
  - type: web
    name: operations-service
    runtime: docker
    dockerfilePath: services/operations_service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: OPERATIONS_DATABASE_URL
        fromDatabase:
          name: rideconnect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rideconnect-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          name: auth-service
          type: web
          envVarKey: JWT_SECRET_KEY
      - key: JWT_ALGORITHM
        value: HS256
      - key: INTERNAL_SERVICE_TOKEN
        fromService:
          name: auth-service
          type: web
          envVarKey: INTERNAL_SERVICE_TOKEN
      - key: AUTH_SERVICE_URL
        fromService:
          name: auth-service
          type: web
          property: host

  # ─── Notification Service ─────────────────────────────────────────────────
  - type: web
    name: notification-service
    runtime: docker
    dockerfilePath: services/notification_service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: NOTIFICATION_DATABASE_URL
        fromDatabase:
          name: rideconnect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rideconnect-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          name: auth-service
          type: web
          envVarKey: JWT_SECRET_KEY
      - key: INTERNAL_SERVICE_TOKEN
        fromService:
          name: auth-service
          type: web
          envVarKey: INTERNAL_SERVICE_TOKEN

  # ─── API Gateway ─────────────────────────────────────────────────────────
  - type: web
    name: gateway
    runtime: docker
    dockerfilePath: gateway/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTH_SERVICE_URL
        fromService:
          name: auth-service
          type: web
          property: host
      - key: MARKETPLACE_SERVICE_URL
        fromService:
          name: marketplace-service
          type: web
          property: host
      - key: OPERATIONS_SERVICE_URL
        fromService:
          name: operations-service
          type: web
          property: host
      - key: NOTIFICATION_SERVICE_URL
        fromService:
          name: notification-service
          type: web
          property: host

  # ─── Rider Web (static site) ──────────────────────────────────────────────
  - type: web
    name: rider-web
    runtime: static
    buildCommand: cd frontend/rider_web && npm install && npm run build
    staticPublishPath: frontend/rider_web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false  # Set to your gateway public URL: https://gateway.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false  # Set to your Google OAuth Client ID

  # ─── Driver Web (static site) ─────────────────────────────────────────────
  - type: web
    name: driver-web
    runtime: static
    buildCommand: cd frontend/driver_web && npm install && npm run build
    staticPublishPath: frontend/driver_web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false  # Set to your gateway public URL: https://gateway.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false  # Set to your Google OAuth Client ID

  # ─── Admin Panel (static site) ────────────────────────────────────────────
  - type: web
    name: admin-panel
    runtime: static
    buildCommand: cd frontend/admin_panel && npm install && npm run build
    staticPublishPath: frontend/admin_panel/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false  # Set to your gateway public URL: https://gateway.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false  # Not needed for admin panel
